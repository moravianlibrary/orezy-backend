---
name: Build base image
# This workflow requires following secrets and variables to be set
# SECRETS
# https://github.com/ -> project -> /settings/secrets/actions
# - GHCR_TOKEN

# VARIABLES
# - MONGODB_URI
# - MONGODB_DB
# - HATCHET_CLIENT_TOKEN

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
      - dev
    # for future use
    # paths:
    #   - Dockerfile
    #   - app/api/Dockerfile
    #   - uv.lock
    #   - pyproject.toml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  set_environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.check_branch_and_tag.outputs.environment }}
    steps:
      - name: "Check the branch and tag"
        id: check_branch_and_tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Use PRODUCTION environment"
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "Use TEST environment"
            echo "environment=test" >> $GITHUB_OUTPUT
          else
            echo "Branch name: ${{ github.ref_name }}, REF: ${{ github.ref }}"
            echo "Neither `main`, nor `dev` branch. Nothing to do. Exit"
            exit 0
          fi

  set_variables:
    runs-on: ubuntu-latest
    needs: set_environment
    if: ${{ needs.set_environment.outputs.environment != '' }}
    environment: ${{ needs.set_environment.outputs.environment }}
    outputs:
      ref_name: ${{ steps.set_vars.outputs.ref_name }}
      docker_image_base: "${{ steps.set_vars.outputs.docker_image }}-base"
      docker_image_api: "${{ steps.set_vars.outputs.docker_image }}-api"
      docker_image_worker: "${{ steps.set_vars.outputs.docker_image }}-worker"
    steps:
      - uses: actions/checkout@v4

      - name: Dump VARS context
        env:
          VARS_CONTEXT: ${{ toJson(vars) }}
        run: |
          echo "$VARS_CONTEXT"
          echo "environment: ${{ needs.set_environment.outputs.environment }}"
      # GITHUB_REF=refs/heads/main
      # if it's just commit in `main` branch
      - name: Set vars
        id: set_vars
        run: |
          REF_NAME=$(echo $GITHUB_REF_NAME | grep -oE '([a-z0-9\-\.]*?)$')
          (
            echo "ref_name=$REF_NAME"
            echo "docker_image=ghcr.io/${GITHUB_REPOSITORY,,}"
          ) | tee --append "$GITHUB_OUTPUT" > "GITHUB_ENV"

  build:
    needs: set_variables
    runs-on: ubuntu-latest
    environment: ${{ needs.set_environment.outputs.environment }}
    strategy:
      max-parallel: 1
      matrix:
        include:
          - image: ${{ needs.set_variables.outputs.docker_image_base }}
            dockerfile: Dockerfile
          - image: ${{ needs.set_variables.outputs.docker_image_api }}
            dockerfile: app/api/Dockerfile
          - image: ${{ needs.set_variables.outputs.docker_image_worker }}
            dockerfile: app/tasks/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: >
          echo "${{ secrets.GHCR_TOKEN }}"
          | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build the Docker image
        run: |
          docker build \
            --tag "${{ matrix.image }}:latest" \
            --tag "${{ matrix.image }}:$(date +%Y%m%d%H%M)" \
            --file ${{ matrix.dockerfile }} .

      - name: Push image to GHCR
        run: >
          docker push --all-tags "${{ matrix.image }}"
